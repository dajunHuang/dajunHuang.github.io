---
layout: page
title: All Posts
---
<div style="text-align: right; display: block;">
  Sort by <a href="/posts-date.html">Date</a> | <a href="/posts-category.html">Category</a> | <b><a href="/posts-tag.html">Tag</a></b>
</div>

{% for tag in site.tags %}
<h3>{{- tag[0] -}}</h3>
<ul>
  {%- for post in tag[1] %}
  <li><a href="{{ post.url }}">{{ post.date | date: "%b %Y" }} - {{ post.title }}</a></li>
  {%- endfor %}
</ul>
{%- endfor %}
