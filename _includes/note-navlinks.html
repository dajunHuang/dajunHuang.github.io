<hr>
<div class="post_navi">
  {%- if page.previous.url -%}
  <a class="post_navi-item nav_prev" href="{{ page.previous.url }}" title="{{ page.previous.title }}">
    <div class="post_navi-arrow">&lt;</div><div class="post_navi-label">Previous Note</div><div><span>{{ page.previous.title }}</span></div>
  </a>
  {%- else -%}
  <a class="post_navi-item nav_prev" href="{{ 'notes-date.html' | absolute_url }}" title="Blogs">
    <div class="post_navi-arrow">&lt;</div><div class="post_navi-label">All Notes</div><div><span>Archive of all previous notes</span></div>
  </a>
  {%- endif -%}
  {%- if page.next.url -%}
  <a class="post_navi-item nav_next" href="{{ page.next.url }}" title="{{ page.next.title }}">
    <div class="post_navi-arrow">&gt;</div><div class="post_navi-label">Next Note</div><div><span>{{ page.next.title }}</span></div>
  </a>
  {%- else -%}
  <a class="post_navi-item nav_next" href="{{ 'notes-date.html' | absolute_url }}" title="Blogs">
    <div class="post_navi-arrow">&gt;</div><div class="post_navi-label">All Notes</div><div><span>Archive of all previous notes</span></div>
  </a>
  {%- endif -%}
</div>
