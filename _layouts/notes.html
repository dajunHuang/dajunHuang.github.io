---
layout: default
---
<link href="/css/override.css" rel="stylesheet" type="text/css">
<article class="post h-entry" itemscope itemtype="http://schema.org/BlogPosting">

  <div class="post-list-horizontal">
    {% if page.images %}
    {% for img in page.images %}
    <div class="in-post-images">
      <img src="{{ img | relative_url }}" alt="Post Image" class="in-post-image">
    </div>
    {% endfor %}
    {% endif %}
  </div>

  <header class="post-header">
    <!-- <h4 class="post-title p-name" itemprop="name headline">{{ page.title | escape }}</h4> -->
    <p class="post-meta">
      <time class="dt-published" datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">
        {%- assign date_format = site.minima.date_format | default: "%Y-%-m-%-d %-H:%-M" -%}
        <i class="fas fa-calendar-alt"> </i>
        {{ page.date | date: date_format }}
      </time>
    
    </p>
  </header>

  <!-- <div class="share-links">
    {% include sharelinks.html %}
  </div> -->

  <div class="post-content e-content" itemprop="articleBody">
    {{ content }}
    {% include note-navlinks.html %}
  </div>

  <a class="u-url" href="{{ page.url | relative_url }}" hidden></a>
</article>
